name: Orvox
options:
  bundleIdPrefix: com.orvox
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:
  Orvox:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Orvox/App
      - path: Orvox/Models
      - path: Orvox/Services
      - path: Orvox/Views
      - path: Orvox/Resources/Assets.xcassets
      - path: Orvox/Resources/tts_server
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.orvox.app
        INFOPLIST_FILE: Orvox/Info.plist
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_STRICT_CONCURRENCY: targeted
        GCC_PREPROCESSOR_DEFINITIONS: "$(inherited)"
    dependencies:
      - sdk: AVFoundation.framework
      - sdk: PDFKit.framework
      - sdk: CoreMedia.framework
      - sdk: NaturalLanguage.framework
      - sdk: UniformTypeIdentifiers.framework
    scheme:
      testTargets: []
      environmentVariables:
        TTS_PORT: "11435"
        TTS_VENV_PATH: "/Users/ruediger/Documents/Xcode Projects/Orvox/tts_venv"
